<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - 游走的小夜叉的博客</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1><a href="{{ url_for('index') }}">游走的小夜叉的博客</a></h1>
        <nav class="categories">
            <ul>
                <li><a href="{{ url_for('index') }}">全部</a></li>
                {% for category in categories %}
                    <li><a href="{{ url_for('category', category=category) }}">{{ category }}</a></li>
                {% endfor %}
                <li><a href="{{ url_for('about') }}" class="active">关于我</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="about-container">
            <div class="profile-picture">
                <img src="{{ url_for('static', filename='tou_xiang.jpg') }}" alt="我的头像">
            </div>
            <div class="about-content">
                <h2>关于我</h2>
                <p>欢迎访问我的博客！我是一名热爱编程和技术的开发者。</p>
                <p>这个博客主要分享我的学习心得、技术笔记和日常生活。</p>
                <p>我擅长的技术领域包括 Python、Flask、Web 开发等。</p>
                <p>如果您有任何问题或建议，欢迎在博客文章下方留言。</p>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; {{ datetime.utcnow().year }} 游走的小夜叉的博客</p>
    </footer>
</body>
</html>
